name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v1.0.1)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: false
        default: "VEXA Android Release"
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
            NAME="${{ github.event.inputs.release_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
            NAME="VEXA ${GITHUB_REF_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vexa/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Mobile Dependencies
        working-directory: vexa
        run: npm ci

      - name: Build Release APK
        working-directory: vexa/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Package Release Files
        shell: bash
        run: |
          mkdir -p dist
          APK_SOURCE="vexa/android/app/build/outputs/apk/release/app-release.apk"
          APK_TARGET="dist/VEXA-${{ steps.meta.outputs.tag }}.apk"
          cp "$APK_SOURCE" "$APK_TARGET"
          sha256sum "$APK_TARGET" > "${APK_TARGET}.sha256"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.meta.outputs.tag }}
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
